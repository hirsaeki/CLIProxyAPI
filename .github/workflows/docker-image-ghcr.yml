name: docker-image-ghcr

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  GHCR_REPO: ghcr.io/hirsaeki/cliproxyapi
  VERSION: ${{ inputs.tag || github.ref_name }}
  SOURCE_REF: ${{ inputs.tag || github.ref }}

jobs:
  build:
    name: build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+([.][0-9]+)+$ ]]; then
            echo "release tag must use the form v<numeric-version>: $VERSION" >&2
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
      - name: Refresh models catalog
        shell: bash
        run: |
          set -euo pipefail
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate build metadata
        shell: bash
        run: |
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.COMMIT }}
            org.opencontainers.image.version=${{ env.VERSION }}
          tags: |
            ${{ env.GHCR_REPO }}:latest-${{ matrix.arch }}
            ${{ env.GHCR_REPO }}:${{ env.VERSION }}-${{ matrix.arch }}

  manifest:
    name: publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${GHCR_REPO}:latest" \
            "${GHCR_REPO}:latest-amd64" \
            "${GHCR_REPO}:latest-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_REPO}:${VERSION}" \
            "${GHCR_REPO}:${VERSION}-amd64" \
            "${GHCR_REPO}:${VERSION}-arm64"
